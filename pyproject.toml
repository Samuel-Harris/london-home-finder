[tool.uv]
package = false

[tool.uv.workspace]
members = ["apps/api", "apps/db", "libs/db", "libs/listings", "libs/repository", "tools/scraper"]

[dependency-groups]
dev = [
    "httpx==0.28.1",
    "import-linter==2.13",
    "pre-commit==4.6.0",
    "pyright==1.1.411",
    "pytest==9.1.1",
    "ruff==0.15.21",
    "rust-just==1.56.0",
    "tach==0.35.0",
]

[tool.pytest.ini_options]
addopts = "-ra --import-mode=importlib"
testpaths = [
    "apps/api/tests",
    "apps/db/tests",
    "libs/db/tests",
    "libs/listings/tests",
    "libs/repository/tests",
    "tools/scraper/tests",
    "tests/integration",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "SIM", "UP"]

[tool.pyright]
include = [
    "apps/api/src",
    "apps/api/tests",
    "apps/db/src",
    "apps/db/tests",
    "libs/db/src",
    "libs/db/tests",
    "libs/listings/src",
    "libs/listings/tests",
    "libs/repository/src",
    "libs/repository/tests",
    "tools/scraper/src",
    "tools/scraper/tests",
    "tests/integration",
    "tools/check_structure.py",
]
pythonVersion = "3.13"
typeCheckingMode = "strict"
venv = ".venv"
venvPath = "."
